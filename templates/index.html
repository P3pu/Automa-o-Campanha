<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Campanha</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="{{ url_for('static', filename='script.js') }}" defer></script>
</head>
<body>
    <main>
        <h1>Portal Campanha</h1>

        <form method="post">
            <label for="evento_magento">Evento Magento</label>

            <div class="linha-evento">
                <input
                    id="evento_magento"
                    name="evento_magento"
                    type="search"
                    list="eventos_magento"
                    placeholder="Pesquise ou digite IDs separados por vírgula"
                    autocomplete="off"
                >
                <button type="button" id="adicionar_evento">
                    Adicionar evento
                </button>
                <datalist id="eventos_magento">
                    {% for evento in eventos %}
                        <option value="{{ evento.id }} - {{ evento.nome }}{% if evento.data %} - {{ evento.data }}{% endif %}"></option>
                    {% endfor %}
                </datalist>

                <div class="acoes-exportacao">
                    <button type="submit" formaction="{{ url_for('exportar_dados_brutos') }}" disabled>
                        Exportar dados brutos
                    </button>
                    <button type="submit" formaction="{{ url_for('exportar_dados_limpos') }}" disabled>
                        Exportar dados limpos
                    </button>
                </div>
            </div>

            <div id="eventos_selecionados" class="eventos-selecionados" aria-live="polite"></div>

            <div class="campo-evento">
                <p class="ajuda">
                    {{ eventos|length }} evento(s) carregado(s) do Magento.
                    Selecione eventos ou digite IDs separados por vírgula antes de exportar.
                </p>
            </div>
        </form>

        {% if erro_eventos %}
            <p class="erro">{{ erro_eventos }}</p>
        {% endif %}
    </main>
</body>
</html>
