<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Campanha</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main>
        <h1>Portal Campanha</h1>

        <form method="get">
            <div class="campo-evento">
                <label for="evento_magento">Evento Magento</label>
                <input
                    id="evento_magento"
                    name="evento_magento"
                    type="search"
                    list="eventos_magento"
                    placeholder="Pesquise por ID, nome ou data"
                    autocomplete="off"
                >
                <datalist id="eventos_magento">
                    {% for evento in eventos %}
                        <option value="{{ evento.id }} - {{ evento.nome }}{% if evento.data %} - {{ evento.data }}{% endif %}"></option>
                    {% endfor %}
                </datalist>
                <p class="ajuda">{{ eventos|length }} evento(s) carregado(s) do Magento.</p>
            </div>
        </form>

        {% if erro_eventos %}
            <p class="erro">{{ erro_eventos }}</p>
        {% endif %}
    </main>
</body>
</html>
